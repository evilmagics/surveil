<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Surveil</title>
    <style>
      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #09090b; /* zinc-950 */
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      #root {
        width: 100%;
        height: 100%;
      }
      .splash-screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        font-family: system-ui, -apple-system, sans-serif;
      }
      .logo-box {
        width: 64px;
        height: 64px;
        background-color: #2563eb; /* blue-600 */
        border-radius: 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 20px 25px -5px rgba(30, 58, 138, 0.3);
        margin-bottom: 24px;
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      .logo-icon {
        width: 32px;
        height: 32px;
        color: white;
      }
      .brand-name {
        font-size: 24px;
        font-weight: 700;
        letter-spacing: -0.025em;
        color: white;
        margin-bottom: 8px;
      }
      .brand-accent {
        color: #3b82f6; /* blue-500 */
      }
      .loading-bar-container {
        width: 24px;
        height: 24px;
        position: relative;
        animation: spin 1s linear infinite;
        opacity: 0.6;
      }
      .loading-bar-container svg {
        color: #3b82f6;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: .8; transform: scale(0.95); }
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div class="splash-screen">
        <div class="logo-box">
          <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2" ry="2"/></svg>
        </div>
        <div class="brand-name">Sur<span class="brand-accent">veil</span></div>
        <div class="loading-bar-container">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
